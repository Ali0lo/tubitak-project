services:
  postgres:
    image: postgres:16
    container_name: todotak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: todotak
      POSTGRES_USER: todotak
      POSTGRES_PASSWORD: todotak
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: todotak-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data: